<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #F0F3F7;
    --green: #8EAAB8;
    --pink: #1A936F;
    --ink: #2D2926;
    --ink-light: #5C5350;
    --white: #FFFFFF;
    --sans: 'DM Sans', -apple-system, 'PingFang SC', system-ui, sans-serif;
    --mono: 'SF Mono', 'Menlo', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }

  .page {
    width: 1080px;
    min-height: 800px;
    background: var(--bg);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .page > .grain {
    position: absolute;
    inset: 0;
    filter: url(#noise);
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
  }

  .ref-code {
    position: absolute;
    top: 36px;
    right: 48px;
    font: 400 22px/1 var(--mono);
    color: var(--ink-light);
  }

  .header {
    padding: 80px 60px 40px;
  }

  .header .title {
    font: 700 72px/1 var(--sans);
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .header .subtitle {
    margin-top: 16px;
    font: 400 32px/1.3 var(--sans);
    color: var(--ink-light);
  }

  .steps {
    padding: 40px 60px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 32px;
  }

  .step .num {
    width: 80px;
    height: 80px;
    background: var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font: 700 36px/1 var(--sans);
    color: var(--pink);
    flex-shrink: 0;
  }

  .step .content {
    flex: 1;
    background: var(--white);
    border-radius: 16px;
    padding: 28px 36px;
  }

  .step .content h3 {
    font: 600 32px/1.2 var(--sans);
    color: var(--ink);
  }

  .step .content .code {
    margin-top: 16px;
    background: var(--bg);
    padding: 16px 20px;
    border-radius: 8px;
    font: 400 24px/1.5 var(--mono);
    color: var(--ink);
  }

  .step .content p {
    margin-top: 12px;
    font: 400 26px/1.4 var(--sans);
    color: var(--ink-light);
  }

  .arrow {
    padding: 0 60px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .arrow .line {
    width: 80px;
    height: 2px;
    background: var(--green);
  }

  .arrow .text {
    font: 400 20px/1 var(--mono);
    color: var(--ink-light);
  }

  .colophon {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 60px 36px;
    border-top: 1px solid rgba(45,41,38,0.08);
    margin-top: auto;
  }

  .colophon .who {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .colophon .who img {
    width: 40px; height: 40px;
    border-radius: 50%; object-fit: cover;
  }

  .colophon .who span {
    font: 400 24px/1 var(--sans);
    color: var(--ink-light);
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>
<div class="page">
  <div class="grain"></div>
  <div class="ref-code">REF—架构 / 快速开始</div>
  
  <div class="header">
    <div class="title">快速开始</div>
    <div class="subtitle">4 步启动 Agent-Hub</div>
  </div>
  
  <div class="steps">
    <div class="step">
      <div class="num">1</div>
      <div class="content">
        <h3>克隆并安装</h3>
        <div class="code">git clone ... && pip install -e .</div>
      </div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div class="content">
        <h3>启动 MCP Server</h3>
        <div class="code">ah server</div>
      </div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div class="content">
        <h3>配置 Agent</h3>
        <p>让 Agent 自己配置，或手动编辑配置文件添加 MCP 服务器</p>
      </div>
    </div>
    <div class="step">
      <div class="num">4</div>
      <div class="content">
        <h3>验证</h3>
        <div class="code">帮我搜索 "MCP protocol"</div>
      </div>
    </div>
  </div>
  
  <div class="colophon">
    <div class="who">
      <img src="assets/logo.png" alt="">
      <span>李继刚</span>
    </div>
  </div>
</div>
</body>
</html>
