<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #F0F3F7;
    --green: #8EAAB8;
    --pink: #1A936F;
    --yellow: #FFF200;
    --ink: #2D2926;
    --ink-light: #5C5350;
    --white: #FFFFFF;
    --serif: 'DM Serif Display', 'KingHwa_OldSong', Georgia, 'Noto Serif SC', serif;
    --sans: 'DM Sans', 'KingHwa_OldSong', -apple-system, 'PingFang SC', system-ui, sans-serif;
    --mono: 'SF Mono', 'Menlo', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }

  .page {
    width: 1080px;
    min-height: 800px;
    background: var(--bg);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .page > .grain {
    position: absolute;
    inset: 0;
    filter: url(#noise);
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
  }

  .ref-code {
    position: absolute;
    top: 36px;
    right: 48px;
    font: 400 22px/1 var(--mono);
    color: var(--ink-light);
    letter-spacing: -0.02em;
  }

  .hero {
    padding: 120px 60px 40px;
  }

  .hero .title {
    font: 700 180px/0.9 var(--sans);
    color: var(--ink);
    letter-spacing: -0.04em;
  }

  .hero .subtitle {
    margin-top: 24px;
    font: 400 42px/1.3 var(--sans);
    color: var(--ink-light);
    max-width: 700px;
  }

  .core {
    padding: 60px 60px 40px;
  }

  .core .badge {
    display: inline-block;
    background: var(--green);
    color: var(--white);
    font: 500 28px/1 var(--sans);
    padding: 12px 24px;
    border-radius: 8px;
  }

  .core .desc {
    margin-top: 20px;
    font: 400 36px/1.5 var(--sans);
    color: var(--ink);
    max-width: 600px;
  }

  .layers {
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .layer {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    padding: 32px 40px;
    background: var(--white);
    border-radius: 16px;
    border-left: 6px solid var(--green);
  }

  .layer:nth-child(2) {
    border-left-color: var(--pink);
    margin-left: 60px;
  }

  .layer .num {
    font: 700 48px/1 var(--mono);
    color: var(--ink-light);
    min-width: 60px;
  }

  .layer .content h3 {
    font: 600 32px/1.2 var(--sans);
    color: var(--ink);
  }

  .layer .content p {
    margin-top: 8px;
    font: 400 26px/1.4 var(--sans);
    color: var(--ink-light);
  }

  .colophon {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 60px 36px;
    border-top: 1px solid rgba(45,41,38,0.08);
    margin-top: auto;
  }

  .colophon .who {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .colophon .who img {
    width: 40px; height: 40px;
    border-radius: 50%; object-fit: cover;
  }

  .colophon .who span {
    font: 400 24px/1 var(--sans);
    color: var(--ink-light);
  }

  .colophon .info-source {
    font: 400 22px/1 var(--mono);
    color: var(--ink-light);
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>
<div class="page">
  <div class="grain"></div>
  <div class="ref-code">REF—架构 / 工具共享层</div>
  
  <div class="hero">
    <div class="title">Agent-Hub</div>
    <div class="subtitle">AI 原生的工具共享层</div>
  </div>
  
  <div class="core">
    <div class="badge">一个 MCP，所有 Agent 共享</div>
    <div class="desc">统一工具接口，让 Claude、Gemini、Cursor、Codex 等所有 Agent 共享同一套能力</div>
  </div>
  
  <div class="layers">
    <div class="layer">
      <div class="num">01</div>
      <div class="content">
        <h3>MCP Server</h3>
        <p>为 AI Agent 提供统一工具接口<br>暴露搜索、抓取、社媒、浏览器控制等能力</p>
      </div>
    </div>
    <div class="layer">
      <div class="num">02</div>
      <div class="content">
        <h3>工具管理器</h3>
        <p>用 ah 命令管理本地所有工具<br>扫描、更新、卸载，一处更新，所有 Agent 生效</p>
      </div>
    </div>
  </div>
  
  <div class="colophon">
    <div class="who">
      <img src="assets/logo.png" alt="">
      <span>李继刚</span>
    </div>
    <span class="info-source">Agent-Hub</span>
  </div>
</div>
</body>
</html>
