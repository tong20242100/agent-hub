name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Only install core and dev dependencies for CI
        pip install ".[dev]"

    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 bin/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 bin/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify core modules compile
      run: |
        python -m py_compile bin/mcp_server.py
        python -m py_compile bin/ah.py
        echo "✅ Core modules compile successfully"

    - name: Verify open-source skills
      run: |
        # Verify SCHEMA.json is valid JSON
        find skills -name "SCHEMA.json" -exec python -c "import json; json.load(open('{}'))" \;
        echo "✅ All skills SCHEMA.json valid"
