name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 bin/ knowledge/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 bin/ knowledge/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests
      run: |
        python scripts/tests/test_nexus_executor.py
        python scripts/tests/test_semantic_router.py
        python scripts/tests/test_tools_manifest.py

    - name: Verify core modules compile
      run: |
        python -m py_compile bin/semantic_router.py
        python -m py_compile bin/commander.py
        python -m py_compile bin/kernel/nexus_executor.py
        python -m py_compile knowledge/vector_store.py
        echo "✅ All core modules compile successfully"

    - name: Verify open-source skills
      run: |
        # Verify SCHEMA.json is valid JSON
        python -c "import json; json.load(open('skills/agency-bin-search/SCHEMA.json'))"
        python -c "import json; json.load(open('skills/agency-bin-scrape/SCHEMA.json'))"
        echo "✅ Open-source skills SCHEMA.json valid"

  verify-tools-manifest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Verify tools manifest is up to date
      run: |
        # Check if tools_manifest.json exists and is valid JSON
        python -c "import json; json.load(open('knowledge/tools_manifest.json'))"
        echo "✅ Tools manifest is valid JSON"
